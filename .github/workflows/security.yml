name: DevSecOps - Security Scan

on:
  push:
    branches: [ main, dev, staging ]
    paths-ignore:
      - 'k8s/overlays/**/kustomization.yaml'
  pull_request:
    branches: [ main, dev, staging ]

permissions:
  contents: read
  security-events: write

env:
  BACKEND_IMAGE: gcr.io/certain-reducer-493511-v6/reclamation-backend
  FRONTEND_IMAGE: gcr.io/certain-reducer-493511-v6/reclamation-frontend

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — SCAN CODE (SAST)
  # ─────────────────────────────────────────────
  code-scan:
    name: Code Security Scan (SAST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Scan sécurité du code Java avec SpotBugs/FindSecBugs
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run SpotBugs security scan
        working-directory: reclamation-app/backend
        run: mvn compile spotbugs:check -DskipTests || true

      # Scan sécurité avec Semgrep (multi-langage)
      - name: Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/java
            p/typescript
            p/owasp-top-ten
            p/secrets
        continue-on-error: false

  # ─────────────────────────────────────────────
  # JOB 2 — SCAN DÉPENDANCES
  # ─────────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Scan dépendances Maven avec Trivy (plus rapide que OWASP)
      - name: Trivy dependency scan — Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: reclamation-app/backend
          format: table
          exit-code: '1'
          severity: CRITICAL
          vuln-type: library

      # Scan dépendances npm
      - name: npm audit — Frontend
        working-directory: reclamation-app/frontend
        run: |
          npm install
          npm audit --audit-level=critical
        continue-on-error: false

  # ─────────────────────────────────────────────
  # JOB 3 — SCAN IMAGE DOCKER (TRIVY)
  # ─────────────────────────────────────────────
  image-scan:
    name: Docker Image Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build backend image pour scan
      - name: Build backend image for scan
        working-directory: reclamation-app/backend
        run: docker build -t reclamation-backend:scan .

      # Upload rapport Trivy en SARIF — runs before exit-code checks
      - name: Trivy scan — SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reclamation-backend:scan
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'  # never fail this step

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # Scan image backend avec Trivy — fails on CRITICAL
      - name: Trivy scan — Backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reclamation-backend:scan
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      # Build frontend image pour scan
      - name: Build frontend image for scan
        working-directory: reclamation-app/frontend
        run: docker build -t reclamation-frontend:scan .

      # Scan image frontend avec Trivy
      - name: Trivy scan — Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reclamation-frontend:scan
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      # Scan filesystem (secrets, configs)
      - name: Trivy scan — Filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL

  # ─────────────────────────────────────────────
  # JOB 4 — VÉRIFICATION SECRETS
  # ─────────────────────────────────────────────
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Détection de secrets dans le code
      - name: GitLeaks — Detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
