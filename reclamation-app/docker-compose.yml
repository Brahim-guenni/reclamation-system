version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: reclamation-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reclamation_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: reclamation-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/reclamation_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: reclamation-frontend
    ports:
      - "4201:80"
    depends_on:
      - backend

volumes:
  mysql_data:
