name: CD - Déploiement Continu (GitOps)

on:
  workflow_run:
    workflows: ["CI - Intégration Continue"]
    types: [completed]
    branches: [main, dev, staging]

env:
  PROJECT_ID: certain-reducer-493511-v6
  BACKEND_IMAGE: gcr.io/certain-reducer-493511-v6/reclamation-backend
  FRONTEND_IMAGE: gcr.io/certain-reducer-493511-v6/reclamation-frontend

jobs:
  deploy:
    name: Update Kustomize & Trigger ArgoCD
    runs-on: ubuntu-latest
    # Only run if CI passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          fetch-depth: 0

      # 2. Determine environment from branch
      - name: Set environment
        id: env
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            echo "ENV=prod" >> $GITHUB_OUTPUT
            echo "OVERLAY=k8s/overlays/prod" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "staging" ]; then
            echo "ENV=staging" >> $GITHUB_OUTPUT
            echo "OVERLAY=k8s/overlays/staging" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "OVERLAY=k8s/overlays/dev" >> $GITHUB_OUTPUT
          fi
          echo "SHA=$SHA" >> $GITHUB_OUTPUT

      # 3. Install kustomize
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # 4. Update image tags in kustomization.yaml
      - name: Update image tags
        run: |
          cd ${{ steps.env.outputs.OVERLAY }}
          kustomize edit set image \
            ${{ env.BACKEND_IMAGE }}=${{ env.BACKEND_IMAGE }}:${{ steps.env.outputs.SHA }} \
            ${{ env.FRONTEND_IMAGE }}=${{ env.FRONTEND_IMAGE }}:${{ steps.env.outputs.SHA }}

      # 5. Commit and push — ArgoCD detects the change and deploys
      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/${{ steps.env.outputs.ENV }}/kustomization.yaml
          git commit -m "chore(cd): update ${{ steps.env.outputs.ENV }} images to ${{ steps.env.outputs.SHA }}" || echo "No changes to commit"
          git push

      # 6. Wait for ArgoCD to sync
      - name: Wait for ArgoCD sync
        run: |
          echo "✅ Manifests updated — ArgoCD will automatically sync reclamation-${{ steps.env.outputs.ENV }}"
          echo "Monitor at: http://$(kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo 'ARGOCD_IP')"
