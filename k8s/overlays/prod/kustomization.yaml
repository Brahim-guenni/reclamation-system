apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: reclamation-prod


namePrefix: prod-

commonLabels:
  environment: prod

images:
- name: gcr.io/certain-reducer-493511-v6/reclamation-backend
  newName: gcr.io/certain-reducer-493511-v6/reclamation-backend
  newTag: ea3cbcab6c402e02c5cfe630fd39616d9bdf46f5
- name: gcr.io/certain-reducer-493511-v6/reclamation-frontend
  newName: gcr.io/certain-reducer-493511-v6/reclamation-frontend
  newTag: ea3cbcab6c402e02c5cfe630fd39616d9bdf46f5

patches:
- path: patches.yaml

resources:
- hpa.yaml
- backend-configmap.yaml
- ../../base

secretGenerator:
- literals:
  - root-password=prod_STRONG_password_789!
  name: mysql-secret
  options:
    disableNameSuffixHash: true
