apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reclamation-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/brahim-guenni/reclamation-system
    targetRevision: staging
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: reclamation-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
