apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/certain-reducer-493511-v6/reclamation-frontend:dev
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: BACKEND_SERVICE_NAME
              value: "backend-service"  # namePrefix prepended by kustomize per env
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
